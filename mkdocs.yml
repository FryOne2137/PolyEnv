site_name: PolyEnv Game Engine
site_description: Polytopia-like game engine with Python bindings for AI training.
repo_url: https://github.com/FryOne2137/PolyEnv
# Generate explicit .html page URLs. This avoids broken relative asset paths on
# static hosts when a directory URL such as /gui is opened without its trailing slash.
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Python API: python_api.md
  - Replays: replays.md
  - GUI: gui.md
  - Map API: map_api.md
  - Model Request API: model_request_api.md
  - Token Reference: token_reference.md
  - Training Loop: training_loop.md
  - Read the Docs: readthedocs.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true
