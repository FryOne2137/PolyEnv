site_name: PolyEnv Game Engine
site_description: Polytopia-like game engine with Python bindings for AI training.
repo_url: https://github.com/FryOne2137/PolyEnv
# Generate explicit .html page URLs. This avoids broken relative asset paths on
# static hosts when a directory URL such as /gui is opened without its trailing slash.
use_directory_urls: false

theme:
  name: material
  features:
    # Keep every documentation page in the left navigation visible.  With
    # navigation.sections Material collapses inactive groups, which made
    # "Visible Event History" disappear after opening e.g. Overview.
    - navigation.expand
    - navigation.instant
    - content.code.copy

nav:
  - Start:
      - Overview: index.md
      - Installation: installation.md
  - Use PolyEnv:
      - Core Python API: python_api.md
      - Model Input And Actions: model_request_api.md
      - Maps And Fog Of War: map_api.md
      - Hidden-Map Predictions: hidden_map_predictions.md
      - Visible Event History: visible_events_api.md
      - Replays: replays.md
      - GUI: gui.md
      - Training Pattern: training_loop.md
      - VectorGameEnv: vector_env.md
      - MctsPool: mcts_pool.md
      - SelfPlayPool: self_play_pool.md
  - Reference:
      - Game Data And IDs: token_reference.md
      - Troubleshooting: troubleshooting.md
  - Maintainers:
      - Read the Docs: readthedocs.md

markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true
